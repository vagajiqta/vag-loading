<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen By Vagajiqta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Video Background -->
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="https://r2.fivemanage.com/ATzePWIHSNxQjqOMDWXiv/loading.webm" type="video/webm">
    </video>

    <div class="overlay"></div>

    <div class="container">

        <div class="server-info">
            <h1 class="server-name">Vagajiqta</h1>
            <p class="server-tagline">Welcome Back</span></p>
        </div>

        <div class="bottom-section">

        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-info">
                <span id="progress-text">Connecting...</span>
                <span id="progress-percent">0%</span>
            </div>
        </div>

        <div class="music-player">
            <audio id="audio" loop>
                <source src="https://r2.fivemanage.com/ATzePWIHSNxQjqOMDWXiv/loading.mp3" type="audio/mpeg">
            </audio>

            <div class="music-controls">
                <button class="music-btn" id="toggle-btn" onclick="toggleMusic()">
                    <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <div class="music-info">
                    <span class="music-label">BABY GANG - CELLA 4</span>
                </div>

                <div class="volume-control">
                    <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                    <input type="range" id="volume-slider" min="0" max="100" value="50" oninput="setVolume(this.value)">
                    <span id="volume-label">50%</span>
                </div>
            </div>
        </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
